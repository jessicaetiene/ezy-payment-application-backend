services:
  mongodb:
    image: mongo:7
    container_name: mongo-api-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: mongo_api
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: